openapi: 3.0.0
info:
  description: "Portail API permettant l'accès à certaines ressources mises à disposition par Montpellier Méditerranée Métropole. Les données sont accessibles au format standardisé Fiware."
  version: "1.0.0"
  title: "Open Data Montpellier Méditerranée Métropole"
  termsOfService: "https://data.montpellier3m.fr/mentions-l%C3%A9gales"
  contact:
    email: "opendata3m@montpellier3m.fr"
  license:
    name: "Apache 2.0"
    url: "http://www.apache.org/licenses/LICENSE-2.0.html"


servers:
  - url: https://portail-api-data.montpellier3m.fr

tags:
  - name: Disponibilité des vélos Vélomagg
    description: Informations en temps réel sur la disponibilité des vélos dans les stations Vélomagg
  - name: Historique des places Vélomagg
    description: Données historiques de disponibilité des vélos Vélomagg
  - name: Parkings
    description: Disponibilité des places de parking en ouvrage
  - name: Historique des places de parking en ouvrage
    description: Données historiques de disponibilité des parkings
  - name: Historique des comptages vélo et piéton
    description: Données historiques des comptages vélo et piéton
  - name: Description Eco-Compteurs
    description: Description et localisation des éco-compteurs
  - name: Taux de remplissage des conteneurs verre
    description: Informations sur le taux de remplissage des conteneurs à verre
  - name: NGSI-LD
    description: Endpoints NGSI-LD avec capacités complètes de filtrage et de requêtes

paths:
  /ngsi-ld/v1/entities?type=BikeHireDockingStation:
    get:
      tags:
       - Disponibilité des vélos Vélomagg
      summary: Get BikeHireDockingStation entities
      description: Simplified endpoint for querying bike docking stations. For geo-queries, use /ngsi-ld/v1/entities
      parameters:
       -  in: query
          name: type
          description: Entity type (fixed to BikeHireDockingStation)
          schema:
            type: string
            enum:
              - BikeHireDockingStation
          required: true
       -  $ref: '#/components/parameters/idParameter'
       -  $ref: '#/components/parameters/limitParameter'
       -  $ref: '#/components/parameters/qParameter'
      responses:
        '200':
          description: Data model example https://smart-data-models.github.io/dataModel.Transportation/BikeHireDockingStation/examples/example-normalized.json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bikestation'
        "404":
          description: Entity not Found
        "405":
          description:  Method Not Allowed
        "429":
          description:  Too many requests ( max per second 10000, max per hour 2000000)
        "500":
          description: Internal Error

  /ngsi-ld/v1/temporal/entities/{entityId}:
    get:
      tags:
       - NGSI-LD
       - Historique des places Vélomagg
       - Historique des places de parking en ouvrage
       - Historique des comptages vélo et piéton
      summary: Query temporal evolution of an entity
      description: |-
        NGSI-LD temporal endpoint for querying the historical data of a specific entity.

        Supports BikeHireDockingStation, OffStreetParking, and EcoCounter entities.
      parameters:
       -  name: entityId
          in: path
          description: |-
            Entity identifier.

            Examples:
            - urn:ngsi-ld:station:001 (BikeHireDockingStation)
            - urn:ngsi-ld:parking:001 (OffStreetParking)
            - urn:ngsi-ld:EcoCounter:XTH19101158 (EcoCounter)
          schema:
            type: string
          required: true
       -  $ref: '#/components/parameters/formatParameter'
       -  $ref: '#/components/parameters/timerelParameter'
       -  $ref: '#/components/parameters/timeAtParameter'
       -  $ref: '#/components/parameters/endTimeAtParameter'
       -  $ref: '#/components/parameters/attrsParameter'
      responses:
        '200':
          description: |-
            Returns temporal data for the specified entity.

            Response format depends on the 'format' parameter (default: temporalValues).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/BikestationTimeseries'
                  - $ref: '#/components/schemas/OffStreetParkingTimeseries'
                  - $ref: '#/components/schemas/EcocounterTimeseries'
        "404":
          description: Entity not Found
        "405":
          description:  Method Not Allowed
        "429":
          description:  Too many requests ( max per second 10000, max per hour 2000000)
        "500":
          description: Internal Error

  /ngsi-ld/v1/entities?type=OffStreetParking:
    get:
      tags:
       - Taux de remplissage des conteneurs verre
      summary: Get WasteContainer entities
      description: Simplified endpoint for querying waste containers. For geo-queries, use /ngsi-ld/v1/entities
      parameters:
       -  in: query
          name: type
          description: Entity type (fixed to WasteContainer)
          schema:
            type: string
            enum:
              - WasteContainer
          required: true
       -  $ref: '#/components/parameters/idParameter'
       -  $ref: '#/components/parameters/limitParameter'
       -  $ref: '#/components/parameters/qParameter'
      responses:
        '200':
          description: |-
            Le modèle actuel est un schéma personnalisé et proposé par la Métropole de Montpellier, des modèles wastecontainer sont sur le site https://smartdatamodels.org/.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WasteContainer'
        "404":
          description: Entity not Found
        "405":
          description:  Method Not Allowed
        "429":
          description:  Too many requests ( max per second 10000, max per hour 2000000)
        "500":
          description: Internal Error

