components:
    parameters:
      idParameter:
        in: query
        name: id
        description: |-
          Returns entities whose ID matches one of the elements in the list.
        schema:
          type: string
        required: false

      offsetParameter:
        in: query
        name: offset
        schema:
          type: integer
        description: The number of items to skip before starting to collect the result set
        required: false

      limitParameter:
        in: query
        name: limit
        schema:
          type: integer
          default: 1000
        description: Limit the number of elements of entities to return (max 1000)
        required: false

      qParameter:
        in: query
        name: q
        description: |-
          Query filter for selecting entities based on attribute values.

          Syntax: attribute operator value

          Operators:
          - == (equal)
          - != (not equal)
          - > (greater than)
          - < (less than)
          - >= (greater or equal)
          - <= (less or equal)
          - ~= (pattern match)

          Example: fillingLevel>50
        schema:
          type: string
        required: false

      georelParameter:
        in: query
        name: georel
        description: |-
          **Geo-Query (1/3):** Spatial relationship for geo-queries.

          ⚠️ Must be used together with 'geometry' and 'coordinates' parameters.

          Values:
          - near;maxDistance==<distance> (proximity query in meters)
          - within (contained within)
          - contains (contains the geometry)
          - intersects (intersects with)
          - equals (geometrically equal)
          - disjoint (does not intersect)

          Example: near;maxDistance==1000
        schema:
          type: string
        required: false

      geometryParameter:
        in: query
        name: geometry
        description: |-
          **Geo-Query (2/3):** Geometry type for geo-queries.

          ⚠️ Must be used together with 'georel' and 'coordinates' parameters.

          Example: Point
        schema:
          type: string
          enum:
            - Point
            - Polygon
            - LineString
            - MultiPoint
            - MultiLineString
            - MultiPolygon
        required: false

      coordinatesParameter:
        in: query
        name: coordinates
        description: |-
          **Geo-Query (3/3):** Coordinates for geo-queries in GeoJSON format.

          ⚠️ Must be used together with 'georel' and 'geometry' parameters.

          Format depends on geometry type:
          - Point: [longitude, latitude]
          - Polygon: [[[lon1,lat1],[lon2,lat2],...,[lon1,lat1]]]
          - LineString: [[lon1,lat1],[lon2,lat2],...]

          Example for Point near Montpellier: [3.88,43.60]
        schema:
          type: string
        required: false

      attrsParameter:
        in: query
        name: attrs
        description: |-
          Comma-separated list of attribute names to include in the response.

          If not specified, all attributes are returned.

          Example: availableBikeNumber,location
        schema:
          type: string
        required: false

      orderByParameter:
        in: query
        name: orderBy
        description: |-
          Comma-separated list of attributes to sort the results.

          Added in NGSI-LD v1.9 specification.

          Syntax:
          - attributeName (ascending order, default)
          - attributeName;desc (descending order)

          Examples:
          - orderBy=name (sort by name ascending)
          - orderBy=name,id;desc (sort by name ascending, then by id descending)
          - orderBy=availableSpotNumber;desc (sort by available spots descending)
        schema:
          type: string
        required: false

      timerelParameter:
        in: query
        name: timerel
        description: |-
          Temporal relationship for temporal queries.

          Values:
          - before
          - after
          - between
        schema:
          type: string
          enum:
            - before
            - after
            - between
        required: false

      timeAtParameter:
        in: query
        name: timeAt
        description: |-
          Timestamp for temporal queries (ISO 8601 format).

          Used with timerel.

          Example: 2023-12-31T23:59:59Z
        schema:
          type: string
          format: date-time
        required: false

      endTimeAtParameter:
        in: query
        name: endTimeAt
        description: |-
          End date for temporal range queries (ISO 8601 format).

          Used with timerel=between.

          Example: 2023-12-31T23:59:59Z
        schema:
          type: string
          format: date-time
        required: false

      formatParameter:
        in: query
        name: format
        description: |-
          Response format for temporal queries.

          Values:
          - temporalValues (default) - Returns time series data
          - normalized - Returns normalized entity representation

          Default: temporalValues
        schema:
          type: string
          enum:
            - temporalValues
            - normalized
          default: temporalValues
        required: false

    schemas:
      # Note: These schemas are shared between new NGSI-LD endpoints and deprecated endpoints
      # They represent the data models used across both API versions

      Bikestation:
        type: object 
        properties:
            id: 
              type: string
              example: 'urn:ngsi-ld:station:001'
              
            type: 
              type: string
              example: 'BikeHireDockingStation'

            address:
              type: object
              properties:
                type:
                  type: string
                  example :  'PostalAddress'
                value:
                  type : object
                  properties:
                    addressCountry:
                      type : string
                      example : "FR"
                    addressLocality:
                      type : string
                      example : "Montpellier"
                    streetAddress:
                      type : string
                      example : "Rue Jules Ferry - Gare Saint-Roch"
                metadata:
                  type: object
            
            availableBikeNumber:
              type: object
              properties:
                type: 
                  type: string 
                  example : 'Number'
                value : 
                  type : integer 
                  example : 12
                metadata:
                  type : object
                  properties:
                    timestamp:
                      type : object
                      properties:
                        type :
                          type : string
                          example : 'DateTime'
                        value : 
                          type : string
                          example : '2022-10-26T10:35:03.000Z'
            
            freeSlotNumber :
              type: object
              properties:
                type:
                  type: string
                  example :  'Number'
                value:
                    type : integer
                    example : 9
                metadata:
                  type: object
                  
            totalSlotNumber :
              type: object
              properties:
                type:
                  type: string
                  example :  'Number'
                value:
                    type : integer
                    example : 12
                metadata:
                  type: object
            
            location:
              type: object
              properties:
                type:
                  type: string
                  example :  'geo:json'
                value:
                  type : object
                  properties:
                    type:
                      type: string
                      example :  'Point'
                    coordinates :
                        type: array
                        items: 
                          example : 3.881346 , 43.605366
                metadata:
                  type: object
            
            status:
              type: object
              properties:
                type: 
                  type: string 
                  example : 'Text'
                value : 
                  type : string
                  example : 'working'
                metadata:
                  type : object

      OffStreetParking:
        type: object 
        properties:
            id: 
              type: string
              example: 'urn:ngsi-ld:parking:001'
              
            type: 
              type: string
              example: 'OffStreetParking'
              
            allowedVehicleType:
              type: object
              properties:
                type:
                  type: string
                  example :  'StructuredValue'
                value:
                  type : array
                  items:
                    type : string
                    example : car , moped
                metadata:
                  type: object
                  
            availableSpotNumber:
              type: object
              properties:
                type: 
                  type: string 
                  example : 'Number'
                value : 
                  type : integer 
                  example : 138
                metadata:
                  type : object
                  properties:
                    timestamp:
                      type : object
                      properties:
                        type :
                          type : string
                          example : 'DateTime'
                        value : 
                          type : string
                          example : '2022-10-24T11:26:59.000Z'

            category:
              type: object
              properties:
                type:
                  type: string
                  example :  'StructuredValue'
                value:
                  type : array
                  items:
                    type : string
                    example : feeCharged , barrierAccess , underground
                metadata:
