openapi: 3.0.0
info:
  description: "Portail API permettant l'accès à certaines ressources mises à disposition par Montpellier Méditerranée Métropole. Les données sont accessibles au format standardisé Fiware."
  version: "1.0.0"
  title: "Open Data Montpellier Méditerranée Métropole"
  termsOfService: "https://data.montpellier3m.fr/mentions-l%C3%A9gales"
  contact:
    email: "opendata3m@montpellier3m.fr"
  license:
    name: "Apache 2.0"
    url: "http://www.apache.org/licenses/LICENSE-2.0.html"


servers:
  - url: http://10.150.123.49:9080/ngsi-ld/v1
  - url: https://portail-api-data.montpellier3m.fr/ngsi-ld/v1

tags:
  - name: Disponibilité des vélos Vélomagg
    description: Informations en temps réel sur la disponibilité des vélos dans les stations Vélomagg
  - name: Historique des places Vélomagg
    description: Données historiques de disponibilité des vélos Vélomagg
  - name: Parkings
    description: Disponibilité des places de parking en ouvrage
  - name: Historique des places de parking en ouvrage
    description: Données historiques de disponibilité des parkings
  - name: Historique des comptages vélo et piéton
    description: Données historiques des comptages vélo et piéton
  - name: Description Eco-Compteurs
    description: Description et localisation des éco-compteurs
  - name: Taux de remplissage des conteneurs verre
    description: Informations sur le taux de remplissage des conteneurs à verre
  - name: NGSI-LD
    description: Endpoints NGSI-LD avec capacités complètes de filtrage et de requêtes

paths:

components:
    schemas: ### TODO REWORK THE NEW TYPES
      BikeHireDockingStation:
        type: object
        description: NGSI-LD entity representing a bike hire docking station.
        required:
          - id
          - type
        properties:
          id:
            type: string
            format: uri
            description: Unique identifier of the entity.
            example: "urn:ngsi-ld:station:006"
          type:
            type: string
            description: NGSI-LD Entity type.
            example: "BikeHireDockingStation"
          address:
            type: object
            properties:
              type:
                type: string
                example: "Property"
              value:
                type: object
                properties:
                  addressCountry:
                    type: string
                    example: "FR"
                  addressLocality:
                    type: string
                    example: "Montpellier"
                  streetAddress:
                    type: string
                    example: "Place Albert 1er - St Charles"
          status:
            type: object
            properties:
              type:
                type: string
                example: "Property"
              value:
                type: string
                description: Operational status of the station.
                example: "working"
              observedAt:
                type: string
                format: date-time
                example: "2026-05-05T09:48:45.000Z"
          location:
            type: object
            properties:
              type:
                type: string
                example: "GeoProperty"
              value:
                type: object
                description: GeoJSON Point representing the location.
                properties:
                  type:
                    type: string
                    example: "Point"
                  coordinates:
                    type: array
                    items:
                      type: number
                      format: float
                    example: [ 3.873375, 43.616768 ]
          freeSlotNumber:
            type: object
            properties:
              type:
                type: string
                example: "Property"
              value:
                type: integer
                example: 24
              unitCode:
                type: string
                description: UN/CEFACT Common Code (e.g., C62 for no unit/count).
                example: "C62"
              observedAt:
                type: string
                format: date-time
                example: "2026-05-05T09:48:45.000Z"
          totalSlotNumber:
            type: object
            properties:
              type:
                type: string
                example: "Property"
              value:
                type: integer
                example: 27
          availableBikeNumber:
            type: object
            properties:
              type:
                type: string
                example: "Property"
              value:
                type: integer
                example: 3
              unitCode:
                type: string
                example: "C62"
              observedAt:
                type: string
                format: date-time
                example: "2026-05-05T09:48:45.000Z"
      OffStreetParking:
